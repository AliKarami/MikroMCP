name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-binaries:
    name: Build binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: node22-linux-x64
            os: ubuntu-latest
            artifact: mikromcp-linux-x64
          - target: node22-linux-arm64
            os: ubuntu-latest
            artifact: mikromcp-linux-arm64
          - target: node22-macos-x64
            os: macos-latest
            artifact: mikromcp-macos-x64
          - target: node22-macos-arm64
            os: macos-latest
            artifact: mikromcp-macos-arm64
          - target: node22-win-x64
            os: windows-latest
            artifact: mikromcp-win-x64.exe

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (bundled for pkg)
        run: npx tsup --config tsup.bundle.config.ts

      - name: Package binary
        run: npx @yao-pkg/pkg dist/main.js --target ${{ matrix.target }} --output ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  docker:
    name: Build Docker image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set lowercase image ref
        run: echo "IMAGE_REF=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/mikromcp" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ${{ env.IMAGE_REF }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6.16.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ env.IMAGE_REF }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4.6.2
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    name: Merge Docker manifests
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4.3.0
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set lowercase image ref
        run: echo "IMAGE_REF=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/mikromcp" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ${{ env.IMAGE_REF }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "$IMAGE_REF@sha256:%s " *)

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, docker-merge]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Download binary artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: ./artifacts
          pattern: mikromcp-*
          merge-multiple: true

      - name: Generate release body
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ] && [ "${{ github.ref_name }}" != "v1.0.0" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
            BODY="## What's changed

          ${CHANGES}"
          else
            BODY="## Welcome to MikroMCP

          MikroMCP is an AI-native MCP server that turns MikroTik RouterOS into a safe, structured control plane for AI agents and DevOps automation. Instead of giving LLMs raw CLI access to production routers, MikroMCP exposes a typed tool surface with strict schema validation, idempotent writes, dry-run previews, and rollback-aware change workflows.

          **77 tools across 10 categories:**
          - 🧭 **Router management** — system status, clock, reboot, packages, files, scripts, scheduler, containers
          - 🌐 **Network operations** — interfaces, VLANs, IP addresses, DHCP leases, DNS static records, bridge ports, WiFi clients
          - 🔥 **Firewall & policy** — filter/NAT rules, mangle rules, address lists, route tables, routing rules
          - 🛰️ **Routing visibility** — static routes, routing tables, BGP peers, OSPF neighbors
          - 🔐 **Secure access** — HTTP bearer auth, bcrypt token hashes, RBAC, tool allowlists, confirmation tokens
          - 🧪 **Diagnostics** — router-originated ping, traceroute, torch, log filtering, guarded SSH execution
          - 🛡️ **Change safety** — dry-run, idempotent writes, snapshots, write journal, plan/apply/rollback workflows
          - ⚙️ **Production behavior** — per-router circuit breakers, retries, correlation IDs, structured logs, audit trails
          - 🤖 **AI-agent fit** — human-readable responses + structured JSON for reasoning and chaining
          - 🧩 **MCP compatibility** — stdio for desktop clients, Streamable HTTP and legacy SSE for remote deployments

          **Three deployment options:** npm (\`npm install -g mikromcp\`), standalone binaries (see assets below), or Docker (\`ghcr.io/alikarami/mikromcp\`).

          See the [README](https://github.com/AliKarami/MikroMCP#readme) and [wiki](https://github.com/AliKarami/MikroMCP/wiki) for full setup, configuration, and tool reference."
          fi
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.BODY }}
          files: |
            artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Upgrade npm for trusted publishing support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "mikromcp@${VERSION}" version 2>/dev/null | grep -q "${VERSION}"; then
            echo "mikromcp@${VERSION} already published, skipping."
          else
            npm publish --access public --provenance
          fi
