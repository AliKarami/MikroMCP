name: Sync wiki

on:
  push:
    branches: [main]
    paths:
      - "docs/wiki/**"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Clone wiki repo
        run: |
          git clone \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git \
            wiki

      - name: Copy wiki files
        run: rsync -av --delete --include="*.md" --exclude="*" docs/wiki/ wiki/

      - name: Commit and push
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes to sync." || \
            git commit -m "sync wiki from docs/wiki @ ${{ github.sha }}" && git push
