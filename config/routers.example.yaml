# MikroMCP Router Registry
# Copy to routers.yaml and configure your routers.
# Credentials are resolved from environment variables by default.
#
# Required RouterOS user group policies:
#   read, write, api, rest-api, test, ssh, sniff, ftp
#
# The `ftp` policy is required for the upload_file tool.
# Enable it with:
#   /user group set <group> policy=...,ftp,...
# FTP service must also be enabled on the router (/ip service enable ftp).
#
# The `ssh` policy is required for ping, traceroute, torch, and run_command —
# those tools execute via SSH because RouterOS 7.x REST API blocks tool commands
# regardless of other policy settings.
# The `sniff` policy is additionally required for torch (packet-capture access).
#
# run_command policy modes
# ─────────────────────────
# Default (no cmdAllow):  All commands allowed except BUILTIN_DENY_PATTERNS.
#                         Add cmdDeny entries to block additional patterns.
# Strict (with cmdAllow): Only commands matching cmdAllow glob patterns are
#                         permitted. BUILTIN_DENY_PATTERNS and cmdDeny still apply.
# Example strict mode:
#   cmdAllow:
#     - "/ip/route/print*"
#     - "/interface/print*"
#     - "/ip/address/print*"

routers:
  core-01:
    host: "10.0.0.1"
    port: 443
    tls:
      enabled: true
      rejectUnauthorized: true     # Set false ONLY for self-signed certs (logs a warning)
      # ca: "/path/to/ca.pem"      # Pin a CA certificate file
      # fingerprint: "aabbccdd..." # Pin exact server cert SHA256 fingerprint (hex, no colons)
    credentials:
      source: "env"                # "env" | "vault"
      envPrefix: "ROUTER_CORE01"   # -> ROUTER_CORE01_USER, ROUTER_CORE01_PASS
    tags: ["datacenter", "core"]
    rosVersion: "7.14"
    # sshPort: 22                  # SSH port (default 22)
    # sshFingerprint: "aabbcc..."  # Pin SSH host key SHA256 fingerprint (hex)
    # cmdAllow:                    # Strict allow-list for run_command (see above)
    #   - "/ip/route/print*"
    # cmdDeny:                     # Additional deny patterns beyond builtins
    #   - "/tool/fetch*"

